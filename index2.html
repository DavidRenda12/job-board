<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Market Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        .header {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
            padding: 1.5rem;
        }

        .header-content {
            max-width: 90rem;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .header h1 {
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header-subtitle {
            color: #94a3b8;
            font-size: clamp(0.85rem, 2vw, 0.95rem);
        }

        .container {
            max-width: 90rem;
            margin: 0 auto;
            padding: clamp(1rem, 3vw, 2rem);
        }

        .search-section {
            margin-bottom: 2rem;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-wrapper::before {
            content: '🔍';
            position: absolute;
            left: 1rem;
            font-size: 1.2rem;
            z-index: 1;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            color: #e2e8f0;
            font-size: 1rem;
        }

        .search-input::placeholder {
            color: #64748b;
        }

        .search-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 1024px) {
            .content-grid {
                grid-template-columns: 280px 1fr;
            }
        }

        .sidebar {
            position: sticky;
            top: 2rem;
            height: fit-content;
        }

        @media (max-width: 1024px) {
            .sidebar {
                position: relative;
                top: 0;
            }
        }

        .filter-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .filter-header h2 {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .clear-btn {
            padding: 0.25rem 0.5rem;
            background: #475569;
            color: #cbd5e1;
            border: none;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .clear-btn:hover {
            background: #64748b;
        }

        .filter-group {
            margin-bottom: 2rem;
        }

        .filter-group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .filter-group h3 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #cbd5e1;
            margin: 0;
        }

        .all-btn {
            padding: 0.2rem 0.4rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 0.25rem;
            font-size: 0.65rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .all-btn:hover {
            background: #2563eb;
        }

        .filter-search-input {
            width: 100%;
            padding: 0.5rem;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 0.375rem;
            color: #e2e8f0;
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
        }

        .filter-search-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .filter-list {
            max-height: 400px;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .filter-list {
                max-height: 300px;
            }
        }

        .filter-list::-webkit-scrollbar {
            width: 6px;
        }

        .filter-list::-webkit-scrollbar-track {
            background: #0f172a;
        }

        .filter-list::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
        }

        .filter-item input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
            accent-color: #3b82f6;
        }

        .filter-item label {
            font-size: 0.875rem;
            color: #94a3b8;
            cursor: pointer;
            flex: 1;
        }

        .filter-item:hover label {
            color: #cbd5e1;
        }

        .results-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        @media (min-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1280px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: clamp(1rem, 2vw, 1.5rem);
            text-align: center;
        }

        .stat-label {
            color: #94a3b8;
            font-size: clamp(0.75rem, 1.5vw, 0.875rem);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-weight: 500;
        }

        .stat-value {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 700;
            color: #60a5fa;
        }

        .table-container {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        thead {
            background: #0f172a;
            border-bottom: 1px solid #334155;
        }

        th {
            padding: clamp(0.75rem, 2vw, 1rem);
            text-align: left;
            font-size: clamp(0.65rem, 1.5vw, 0.75rem);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #cbd5e1;
        }

        td {
            padding: clamp(0.75rem, 2vw, 1rem);
            border-bottom: 1px solid #334155;
            font-size: clamp(0.85rem, 1.5vw, 0.9375rem);
        }

        tbody tr:hover {
            background: rgba(71, 85, 105, 0.2);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .company-cell {
            font-weight: 600;
            color: #e2e8f0;
        }

        .link-btn {
            display: inline-block;
            padding: clamp(0.4rem, 1vw, 0.5rem) clamp(0.75rem, 2vw, 1rem);
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 0.375rem;
            font-weight: 600;
            font-size: clamp(0.75rem, 1.5vw, 0.875rem);
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            white-space: nowrap;
        }

        .link-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .link-btn:active {
            transform: translateY(0);
        }

        .empty-state {
            padding: clamp(1.5rem, 5vw, 3rem);
            text-align: center;
            color: #94a3b8;
            font-size: clamp(0.9rem, 2vw, 1rem);
        }

        .loading {
            padding: clamp(1rem, 3vw, 2rem);
            text-align: center;
            color: #94a3b8;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>💼 Job Market Dashboard</h1>
            <p class="header-subtitle">5,484 jobs from Greenhouse + Sacramento career pages</p>
        </div>
    </div>

    <div class="container">
        <div class="search-section">
            <div class="search-wrapper">
                <input
                    type="text"
                    id="mainSearch"
                    class="search-input"
                    placeholder="Search job titles..."
                >
            </div>
        </div>

        <div class="content-grid">
            <div class="sidebar">
                <div class="filter-header">
                    <h2>🎯 Filters</h2>
                    <button class="clear-btn" onclick="clearAllFilters()">Clear</button>
                </div>

                <div class="filter-group">
                    <div class="filter-group-header">
                        <h3>Company</h3>
                        <button class="all-btn" onclick="selectAllCompanies()">All</button>
                    </div>
                    <input type="text" class="filter-search-input" id="companySearch" placeholder="Search..." onkeyup="filterCompanies()">
                    <div class="filter-list" id="companyList"></div>
                </div>

                <div class="filter-group">
                    <div class="filter-group-header">
                        <h3>Location</h3>
                        <button class="all-btn" onclick="selectAllLocations()">All</button>
                    </div>
                    <input type="text" class="filter-search-input" id="locationSearch" placeholder="Search..." onkeyup="filterLocations()">
                    <div class="filter-list" id="locationList"></div>
                </div>

                <div class="filter-group">
                    <div class="filter-group-header">
                        <h3>Job Title</h3>
                        <button class="all-btn" onclick="selectAllTitles()">All</button>
                    </div>
                    <input type="text" class="filter-search-input" id="titleSearch" placeholder="Search..." onkeyup="filterTitles()">
                    <div class="filter-list" id="titleList"></div>
                </div>
            </div>

            <div class="results-section">
                <div class="stats-grid">
                    <div class="stat-card" style="cursor: pointer;" onclick="sortByCompany()">
                        <div class="stat-label">Companies ↕️</div>
                        <div class="stat-value" id="companyCount">0</div>
                    </div>
                    <div class="stat-card" style="cursor: pointer;" onclick="sortByLocation()">
                        <div class="stat-label">Locations ↕️</div>
                        <div class="stat-value" id="locationCount">0</div>
                    </div>
                    <div class="stat-card" style="cursor: pointer;" onclick="sortByTitle()">
                        <div class="stat-label">Job Titles ↕️</div>
                        <div class="stat-value" id="titleCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Results</div>
                        <div class="stat-value" id="resultCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Last Scraped</div>
                        <div class="stat-value" id="lastScraped" style="font-size: 0.9rem; color: #94a3b8;">Loading...</div>
                    </div>
                </div>

                <div class="table-container">
                    <div id="loadingState" class="loading">Loading jobs...</div>
                    <table id="jobsTable" style="display: none;">
                        <thead>
                            <tr>
                                <th>Company</th>
                                <th>Job Title</th>
                                <th>Location</th>
                                <th>Applied</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="jobsBody"></tbody>
                    </table>
                    <div id="emptyState" class="empty-state" style="display: none;">No jobs match your filters</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allJobs = [];
        let sortState = {
            company: 'asc',
            location: 'asc',
            title: 'asc'
        };

        async function loadData() {
            try {
                const response = await fetch('all_jobs_combined.csv');
                if (!response.ok) throw new Error('File not found');
                
                const csv = await response.text();
                Papa.parse(csv, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        allJobs = results.data.filter(job => job.company && job.title);
                        
                        if (allJobs.length === 0) {
                            document.getElementById('loadingState').textContent = 'No jobs found';
                            return;
                        }
                        
                        document.getElementById('loadingState').style.display = 'none';
                        
                        buildFilters();
                        renderJobs();
                    }
                });
            } catch (error) {
                document.getElementById('loadingState').textContent = '❌ Could not load all_jobs_combined.csv';
            }
        }

        async function loadLastScraped() {
            try {
                const response = await fetch('scrape_time.txt');
                if (response.ok) {
                    const text = await response.text();
                    document.getElementById('lastScraped').textContent = text.trim();
                }
            } catch (e) {
                document.getElementById('lastScraped').textContent = 'Check back soon';
            }
        }

        function buildFilters() {
            const companies = [...new Set(allJobs.map(j => j.company))].sort();
            const locations = [...new Set(allJobs.filter(j => j.location).map(j => j.location))].sort();
            const titles = [...new Set(allJobs.map(j => j.title))].sort();

            document.getElementById('companyList').innerHTML = companies.map((c, i) => `
                <div class="filter-item">
                    <input type="checkbox" id="c${i}" data-value="${c}" onchange="renderJobs()">
                    <label for="c${i}">${c}</label>
                </div>
            `).join('');

            document.getElementById('locationList').innerHTML = locations.map((l, i) => `
                <div class="filter-item">
                    <input type="checkbox" id="l${i}" data-value="${l}" onchange="renderJobs()">
                    <label for="l${i}">${l}</label>
                </div>
            `).join('');

            document.getElementById('titleList').innerHTML = titles.slice(0, 50).map((t, i) => `
                <div class="filter-item">
                    <input type="checkbox" id="t${i}" data-value="${t}" onchange="renderJobs()">
                    <label for="t${i}">${t}</label>
                </div>
            `).join('');
        }

        function filterCompanies() {
            const search = document.getElementById('companySearch').value.toLowerCase();
            document.querySelectorAll('#companyList .filter-item').forEach(item => {
                const text = item.querySelector('label').textContent.toLowerCase();
                item.style.display = text.includes(search) ? 'flex' : 'none';
            });
        }

        function filterLocations() {
            const search = document.getElementById('locationSearch').value.toLowerCase();
            document.querySelectorAll('#locationList .filter-item').forEach(item => {
                const text = item.querySelector('label').textContent.toLowerCase();
                item.style.display = text.includes(search) ? 'flex' : 'none';
            });
        }

        function filterTitles() {
            const search = document.getElementById('titleSearch').value.toLowerCase();
            document.querySelectorAll('#titleList .filter-item').forEach(item => {
                const text = item.querySelector('label').textContent.toLowerCase();
                item.style.display = text.includes(search) ? 'flex' : 'none';
            });
        }

        function selectAllCompanies() {
            document.querySelectorAll('#companyList .filter-item').forEach(item => {
                if (item.style.display !== 'none') {
                    item.querySelector('input[type="checkbox"]').checked = true;
                }
            });
            renderJobs();
        }

        function selectAllLocations() {
            document.querySelectorAll('#locationList .filter-item').forEach(item => {
                if (item.style.display !== 'none') {
                    item.querySelector('input[type="checkbox"]').checked = true;
                }
            });
            renderJobs();
        }

        function selectAllTitles() {
            document.querySelectorAll('#titleList .filter-item').forEach(item => {
                if (item.style.display !== 'none') {
                    item.querySelector('input[type="checkbox"]').checked = true;
                }
            });
            renderJobs();
        }

        function clearAllFilters() {
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.getElementById('mainSearch').value = '';
            document.getElementById('companySearch').value = '';
            document.getElementById('locationSearch').value = '';
            document.getElementById('titleSearch').value = '';
            renderJobs();
        }

        function sortByCompany() {
            const jobsBody = document.getElementById('jobsBody');
            const rows = Array.from(jobsBody.querySelectorAll('tr'));
            
            rows.sort((a, b) => {
                const compA = a.cells[0].textContent.trim();
                const compB = b.cells[0].textContent.trim();
                
                if (sortState.company === 'asc') {
                    return compA.localeCompare(compB);
                } else {
                    return compB.localeCompare(compA);
                }
            });
            
            rows.forEach(row => jobsBody.appendChild(row));
            sortState.company = sortState.company === 'asc' ? 'desc' : 'asc';
        }

        function sortByLocation() {
            const jobsBody = document.getElementById('jobsBody');
            const rows = Array.from(jobsBody.querySelectorAll('tr'));
            
            rows.sort((a, b) => {
                const locA = a.cells[2].textContent.trim();
                const locB = b.cells[2].textContent.trim();
                
                if (sortState.location === 'asc') {
                    return locA.localeCompare(locB);
                } else {
                    return locB.localeCompare(locA);
                }
            });
            
            rows.forEach(row => jobsBody.appendChild(row));
            sortState.location = sortState.location === 'asc' ? 'desc' : 'asc';
        }

        function sortByTitle() {
            const jobsBody = document.getElementById('jobsBody');
            const rows = Array.from(jobsBody.querySelectorAll('tr'));
            
            rows.sort((a, b) => {
                const titleA = a.cells[1].textContent.trim();
                const titleB = b.cells[1].textContent.trim();
                
                if (sortState.title === 'asc') {
                    return titleA.localeCompare(titleB);
                } else {
                    return titleB.localeCompare(titleA);
                }
            });
            
            rows.forEach(row => jobsBody.appendChild(row));
            sortState.title = sortState.title === 'asc' ? 'desc' : 'asc';
        }

        function applyAndMark(jobUrl, jobId) {
            toggleApplied(jobId, true);
            window.open(jobUrl, '_blank');
        }

        function toggleApplied(jobId, isApplied) {
            let appliedJobs = JSON.parse(localStorage.getItem('appliedJobs')) || [];
            
            if (isApplied) {
                if (!appliedJobs.includes(jobId)) {
                    appliedJobs.push(jobId);
                }
            } else {
                appliedJobs = appliedJobs.filter(id => id !== jobId);
            }
            
            localStorage.setItem('appliedJobs', JSON.stringify(appliedJobs));
            renderJobs();
        }

        function renderJobs() {
            const search = document.getElementById('mainSearch').value.toLowerCase();
            
            const checkedCompanies = new Set([...document.querySelectorAll('#companyList input:checked')].map(cb => cb.getAttribute('data-value')));
            const checkedLocations = new Set([...document.querySelectorAll('#locationList input:checked')].map(cb => cb.getAttribute('data-value')));
            const checkedTitles = new Set([...document.querySelectorAll('#titleList input:checked')].map(cb => cb.getAttribute('data-value')));

            const filtered = allJobs.filter(job => {
                const matchCompany = checkedCompanies.size === 0 || checkedCompanies.has(job.company);
                const matchLocation = checkedLocations.size === 0 || checkedLocations.has(job.location);
                const matchTitle = checkedTitles.size === 0 || checkedTitles.has(job.title);
                const matchSearch = !search || job.title.toLowerCase().includes(search);
                
                return matchCompany && matchLocation && matchTitle && matchSearch;
            });

            document.getElementById('resultCount').textContent = filtered.length.toLocaleString();
            document.getElementById('companyCount').textContent = new Set(filtered.map(j => j.company)).size;
            document.getElementById('locationCount').textContent = new Set(filtered.map(j => j.location)).size;
            document.getElementById('titleCount').textContent = new Set(filtered.map(j => j.title)).size;

            const jobsBody = document.getElementById('jobsBody');
            const jobsTable = document.getElementById('jobsTable');
            const emptyState = document.getElementById('emptyState');

            if (filtered.length === 0) {
                jobsTable.style.display = 'none';
                emptyState.style.display = 'block';
            } else {
                jobsBody.innerHTML = filtered.map((job, idx) => {
                    const appliedJobs = JSON.parse(localStorage.getItem('appliedJobs')) || [];
                    const isApplied = appliedJobs.includes(job.id);
                    const checkboxId = `applied-${idx}`;
                    
                    return `
                    <tr style="opacity: ${isApplied ? '0.6' : '1'};">
                        <td class="company-cell">${job.company}</td>
                        <td>${job.title}</td>
                        <td>${job.location || '—'}</td>
                        <td><input type="checkbox" id="${checkboxId}" ${isApplied ? 'checked' : ''} onchange="toggleApplied('${job.id}', this.checked)"></td>
                        <td><button class="link-btn" onclick="applyAndMark('${job.url}', '${job.id}')">Apply</button></td>
                    </tr>
                `;
                }).join('');
                jobsTable.style.display = 'table';
                emptyState.style.display = 'none';
            }
        }

        document.getElementById('mainSearch').addEventListener('input', renderJobs);
        loadData();
        loadLastScraped();
    </script>
</body>
</html>
