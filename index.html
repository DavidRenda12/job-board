<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Market Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        .header {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
            padding: 1.5rem;
        }

        .header-content {
            max-width: 90rem;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .header h1 {
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header-subtitle {
            color: #94a3b8;
            font-size: clamp(0.85rem, 2vw, 0.95rem);
        }

        .container {
            max-width: 90rem;
            margin: 0 auto;
            padding: clamp(1rem, 3vw, 2rem);
        }

        .search-section {
            margin-bottom: 2rem;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-wrapper::before {
            content: '🔍';
            position: absolute;
            left: 1rem;
            font-size: 1.2rem;
            z-index: 1;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            color: #e2e8f0;
            font-size: 1rem;
        }

        .search-input::placeholder {
            color: #64748b;
        }

        .search-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 1024px) {
            .content-grid {
                grid-template-columns: 280px 1fr;
            }
        }

        .sidebar {
            position: sticky;
            top: 2rem;
            height: fit-content;
        }

        @media (max-width: 1024px) {
            .sidebar {
                position: relative;
                top: 0;
            }
        }

        .filter-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .filter-header h2 {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .clear-btn {
            padding: 0.25rem 0.5rem;
            background: #475569;
            color: #cbd5e1;
            border: none;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .clear-btn:hover {
            background: #64748b;
        }

        .filter-group {
            margin-bottom: 2rem;
        }

        .filter-group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .filter-group h3 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #cbd5e1;
            margin: 0;
        }

        .all-btn {
            padding: 0.2rem 0.4rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 0.25rem;
            font-size: 0.65rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .all-btn:hover {
            background: #2563eb;
        }

        .filter-search-input {
            width: 100%;
            padding: 0.5rem;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 0.375rem;
            color: #e2e8f0;
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
        }

        .filter-search-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .filter-list {
            max-height: 400px;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .filter-list {
                max-height: 300px;
            }
        }

        .filter-list::-webkit-scrollbar {
            width: 6px;
        }

        .filter-list::-webkit-scrollbar-track {
            background: #0f172a;
        }

        .filter-list::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
        }

        .filter-item input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
            accent-color: #3b82f6;
        }

        .filter-item label {
            font-size: 0.875rem;
            color: #94a3b8;
            cursor: pointer;
            flex: 1;
        }

        .filter-item:hover label {
            color: #cbd5e1;
        }

        .results-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        @media (min-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1280px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: clamp(1rem, 2vw, 1.5rem);
            text-align: center;
        }

        .stat-label {
            color: #94a3b8;
            font-size: clamp(0.75rem, 1.5vw, 0.875rem);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-weight: 500;
        }

        .stat-value {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 700;
            color: #60a5fa;
        }

        .table-container {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            overflow-x: visible;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        @media (max-width: 768px) {
            table {
                font-size: 0.7rem;
            }

            th, td {
                padding: 0.4rem !important;
            }

            .link-btn {
                padding: 0.25rem 0.4rem !important;
                font-size: 0.6rem !important;
            }

            .company-cell {
                max-width: 80px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
        }

        thead {
            background: #0f172a;
            border-bottom: 1px solid #334155;
        }

        th {
            padding: clamp(0.75rem, 2vw, 1rem);
            text-align: left;
            font-size: clamp(0.65rem, 1.5vw, 0.75rem);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #cbd5e1;
        }

        td {
            padding: clamp(0.75rem, 2vw, 1rem);
            border-bottom: 1px solid #334155;
            font-size: clamp(0.85rem, 1.5vw, 0.9375rem);
        }

        tbody tr:hover {
            background: rgba(71, 85, 105, 0.2);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .company-cell {
            font-weight: 600;
            color: #e2e8f0;
        }

        @media (max-width: 768px) {
            .company-cell, 
            .company-header {
                display: none;
            }
        }

        .link-btn {
            display: inline-block;
            padding: clamp(0.4rem, 1vw, 0.5rem) clamp(0.75rem, 2vw, 1rem);
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 0.375rem;
            font-weight: 600;
            font-size: clamp(0.75rem, 1.5vw, 0.875rem);
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            white-space: nowrap;
        }

        .link-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .link-btn:active {
            transform: translateY(0);
        }

        .empty-state {
            padding: clamp(1.5rem, 5vw, 3rem);
            text-align: center;
            color: #94a3b8;
            font-size: clamp(0.9rem, 2vw, 1rem);
        }

        .loading {
            padding: clamp(1rem, 3vw, 2rem);
            text-align: center;
            color: #94a3b8;
        }

        /* Relevance score badges */
        .score-badge {
            display: inline-block;
            padding: 0.2rem 0.55rem;
            border-radius: 9999px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            min-width: 2.2rem;
            text-align: center;
        }
        .score-excellent { background: rgba(34,197,94,0.18); color: #4ade80; border: 1px solid rgba(34,197,94,0.35); }
        .score-strong    { background: rgba(59,130,246,0.18); color: #60a5fa; border: 1px solid rgba(59,130,246,0.35); }
        .score-good      { background: rgba(234,179,8,0.18);  color: #facc15; border: 1px solid rgba(234,179,8,0.35); }
        .score-weak      { background: rgba(249,115,22,0.18); color: #fb923c; border: 1px solid rgba(249,115,22,0.35); }
        .score-low       { background: rgba(100,116,139,0.18);color: #94a3b8; border: 1px solid rgba(100,116,139,0.35); }

        /* Top matches toggle button */
        .top-match-btn {
            width: 100%;
            padding: 0.6rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(34,197,94,0.4);
            background: rgba(34,197,94,0.1);
            color: #4ade80;
            text-align: left;
        }
        .top-match-btn.active {
            background: rgba(34,197,94,0.25);
            border-color: #4ade80;
        }
        .top-match-btn:hover {
            background: rgba(34,197,94,0.2);
        }

        /* Sortable column headers */
        th.sortable {
            cursor: pointer;
            user-select: none;
        }
        th.sortable:hover {
            color: #e2e8f0;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>💼 Job Market Dashboard</h1>
            <p class="header-subtitle">5,484 jobs from Greenhouse + Sacramento career pages</p>
        </div>
    </div>

    <div class="container">
        <div class="content-grid">
            <div class="sidebar">
                <div class="filter-header">
                    <h2>🎯 Filters</h2>
                    <button class="clear-btn" onclick="clearAllFilters()">Clear</button>
                </div>

                <div class="filter-group">
                    <button class="top-match-btn" id="topMatchBtn" onclick="toggleTopMatches()">
                        ★ Top Matches Only
                    </button>
                </div>

                <div class="filter-group">
                    <div class="filter-group-header">
                        <h3>Job Title</h3>
                    </div>
                    <input type="text" class="filter-search-input" id="titleSearch" placeholder="Search job titles..." onkeyup="renderJobs()">
                </div>

                <div class="filter-group">
                    <div class="filter-group-header">
                        <h3>Location</h3>
                    </div>
                    <input type="text" class="filter-search-input" id="locationSearch" placeholder="Search locations..." onkeyup="renderJobs()">
                </div>
            </div>

            <div class="results-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Results</div>
                        <div class="stat-value" id="resultCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label" style="color: #4ade80;">Top Matches</div>
                        <div class="stat-value" id="topMatchCount" style="color: #4ade80;">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Companies</div>
                        <div class="stat-value" id="companyCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Last Scraped</div>
                        <div class="stat-value" id="lastScraped" style="font-size: 0.9rem; color: #94a3b8;">Loading...</div>
                    </div>
                </div>

                <div class="table-container">
                    <div id="loadingState" class="loading">Loading jobs...</div>
                    <table id="jobsTable" style="display: none;">
                        <thead>
                            <tr>
                                <th class="sortable" onclick="sortByCol('score')">Match ↕</th>
                                <th class="company-header sortable" onclick="sortByCol('company')">Company ↕</th>
                                <th class="sortable" onclick="sortByCol('title')">Job Title ↕</th>
                                <th class="sortable" onclick="sortByCol('location')">Location ↕</th>
                                <th>Applied</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="jobsBody"></tbody>
                    </table>
                    <div id="emptyState" class="empty-state" style="display: none;">No jobs match your filters</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allJobs = [];
        let showTopMatchesOnly = false;
        let currentSortCol = 'score';
        let currentSortDir = 'desc';

        // ----------------------------------------------------------------
        // Score badge helper
        // ----------------------------------------------------------------
        function scoreBadge(score) {
            const s = parseInt(score) || 0;
            let cls, label;
            if (s >= 90)      { cls = 'score-excellent'; label = s; }
            else if (s >= 70) { cls = 'score-strong';    label = s; }
            else if (s >= 50) { cls = 'score-good';      label = s; }
            else if (s >= 25) { cls = 'score-weak';      label = s; }
            else              { cls = 'score-low';        label = s; }
            return `<span class="score-badge ${cls}">${label}</span>`;
        }

        // ----------------------------------------------------------------
        // Data loading
        // ----------------------------------------------------------------
        async function loadData() {
            try {
                const response = await fetch('all_jobs_combined.csv');
                if (!response.ok) throw new Error('File not found');

                const csv = await response.text();
                Papa.parse(csv, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        allJobs = results.data.filter(job => job.company && job.title);

                        if (allJobs.length === 0) {
                            document.getElementById('loadingState').textContent = 'No jobs found';
                            return;
                        }

                        document.getElementById('loadingState').style.display = 'none';
                        renderJobs();
                    }
                });
            } catch (error) {
                document.getElementById('loadingState').textContent = '❌ Could not load all_jobs_combined.csv';
            }
        }

        async function loadLastScraped() {
            try {
                const response = await fetch('scrape_time.txt');
                if (response.ok) {
                    const text = await response.text();
                    document.getElementById('lastScraped').textContent = text.trim();
                }
            } catch (e) {
                document.getElementById('lastScraped').textContent = 'Check back soon';
            }
        }

        // ----------------------------------------------------------------
        // Filters & controls
        // ----------------------------------------------------------------
        function toggleTopMatches() {
            showTopMatchesOnly = !showTopMatchesOnly;
            const btn = document.getElementById('topMatchBtn');
            btn.classList.toggle('active', showTopMatchesOnly);
            btn.textContent = showTopMatchesOnly ? '★ Top Matches Only  ✓' : '★ Top Matches Only';
            renderJobs();
        }

        function clearAllFilters() {
            document.getElementById('titleSearch').value = '';
            document.getElementById('locationSearch').value = '';
            showTopMatchesOnly = false;
            document.getElementById('topMatchBtn').classList.remove('active');
            document.getElementById('topMatchBtn').textContent = '★ Top Matches Only';
            currentSortCol = 'score';
            currentSortDir = 'desc';
            renderJobs();
        }

        // ----------------------------------------------------------------
        // Sorting
        // ----------------------------------------------------------------
        function sortByCol(col) {
            if (currentSortCol === col) {
                currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc';
            } else {
                currentSortCol = col;
                currentSortDir = col === 'score' ? 'desc' : 'asc';
            }
            renderJobs();
        }

        function sortJobs(jobs) {
            return [...jobs].sort((a, b) => {
                let valA, valB;
                if (currentSortCol === 'score') {
                    valA = parseInt(a.relevance_score) || 0;
                    valB = parseInt(b.relevance_score) || 0;
                    return currentSortDir === 'desc' ? valB - valA : valA - valB;
                } else {
                    valA = (a[currentSortCol] || '').toLowerCase();
                    valB = (b[currentSortCol] || '').toLowerCase();
                    const cmp = valA.localeCompare(valB);
                    return currentSortDir === 'asc' ? cmp : -cmp;
                }
            });
        }

        // ----------------------------------------------------------------
        // Applied tracking
        // ----------------------------------------------------------------
        function applyAndMark(jobUrl, jobId) {
            toggleApplied(jobId, true);
            window.open(jobUrl, '_blank');
        }

        function toggleApplied(jobId, isApplied) {
            let appliedJobs = JSON.parse(localStorage.getItem('appliedJobs')) || [];
            if (isApplied) {
                if (!appliedJobs.includes(jobId)) appliedJobs.push(jobId);
            } else {
                appliedJobs = appliedJobs.filter(id => id !== jobId);
            }
            localStorage.setItem('appliedJobs', JSON.stringify(appliedJobs));
            renderJobs();
        }

        // ----------------------------------------------------------------
        // Render
        // ----------------------------------------------------------------
        function renderJobs() {
            const titleSearch    = document.getElementById('titleSearch').value.toLowerCase();
            const locationSearch = document.getElementById('locationSearch').value.toLowerCase();

            let filtered = allJobs.filter(job => {
                const matchTitle    = !titleSearch    || job.title.toLowerCase().includes(titleSearch);
                const matchLocation = !locationSearch || (job.location && job.location.toLowerCase().includes(locationSearch));
                const matchTop      = !showTopMatchesOnly || (parseInt(job.relevance_score) || 0) >= 70;
                return matchTitle && matchLocation && matchTop;
            });

            const topMatchCount = filtered.filter(j => (parseInt(j.relevance_score) || 0) >= 70).length;

            filtered = sortJobs(filtered);

            document.getElementById('resultCount').textContent   = filtered.length.toLocaleString();
            document.getElementById('topMatchCount').textContent = topMatchCount.toLocaleString();
            document.getElementById('companyCount').textContent  = new Set(filtered.map(j => j.company)).size;

            const jobsBody  = document.getElementById('jobsBody');
            const jobsTable = document.getElementById('jobsTable');
            const emptyState = document.getElementById('emptyState');

            if (filtered.length === 0) {
                jobsTable.style.display = 'none';
                emptyState.style.display = 'block';
            } else {
                const appliedJobs = JSON.parse(localStorage.getItem('appliedJobs')) || [];
                jobsBody.innerHTML = filtered.map((job, idx) => {
                    const isApplied = appliedJobs.includes(job.id);
                    const checkboxId = `applied-${idx}`;
                    const score = parseInt(job.relevance_score) || 0;
                    return `
                    <tr style="opacity: ${isApplied ? '0.5' : '1'};">
                        <td style="text-align:center;">${scoreBadge(score)}</td>
                        <td class="company-cell">${job.company}</td>
                        <td>${job.title}</td>
                        <td>${job.location || '—'}</td>
                        <td><input type="checkbox" id="${checkboxId}" ${isApplied ? 'checked' : ''} onchange="toggleApplied('${job.id}', this.checked)"></td>
                        <td><button class="link-btn" onclick="applyAndMark('${job.url}', '${job.id}')">Apply</button></td>
                    </tr>`;
                }).join('');
                jobsTable.style.display = 'table';
                emptyState.style.display = 'none';
            }
        }

        document.getElementById('titleSearch').addEventListener('input', renderJobs);
        document.getElementById('locationSearch').addEventListener('input', renderJobs);
        loadData();
        loadLastScraped();
    </script>
</body>
</html>
