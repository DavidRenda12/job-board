<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Market Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
            padding: 2rem;
        }

        .header-content {
            max-width: 90rem;
            margin: 0 auto;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header-subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        /* Main Container */
        .container {
            max-width: 90rem;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Search Bar */
        .search-section {
            margin-bottom: 2rem;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            color: #e2e8f0;
            font-size: 1rem;
            position: relative;
        }

        .search-input::placeholder {
            color: #64748b;
        }

        .search-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-wrapper::before {
            content: '🔍';
            position: absolute;
            left: 1rem;
            font-size: 1.2rem;
        }

        /* Grid Layout */
        .content-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
        }

        /* Sidebar */
        .sidebar {
            position: sticky;
            top: 2rem;
            height: fit-content;
        }

        .filter-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .filter-header h2 {
            font-size: 1.125rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .clear-btn {
            padding: 0.25rem 0.5rem;
            background: #475569;
            color: #cbd5e1;
            border: none;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .clear-btn:hover {
            background: #64748b;
        }

        .filter-group {
            margin-bottom: 1.5rem;
        }

        .filter-group h3 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #cbd5e1;
            margin-bottom: 0.75rem;
        }

        .filter-list {
            max-height: 200px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .filter-list::-webkit-scrollbar {
            width: 6px;
        }

        .filter-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .filter-list::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }

        .filter-list::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
        }

        .filter-item input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
            accent-color: #3b82f6;
        }

        .filter-item label {
            font-size: 0.875rem;
            color: #94a3b8;
            cursor: pointer;
            flex: 1;
            transition: color 0.2s;
        }

        .filter-item:hover label {
            color: #cbd5e1;
        }

        /* Results Section */
        .results-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-weight: 500;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }

        .stat-value.blue {
            color: #60a5fa;
        }

        .stat-value.green {
            color: #4ade80;
        }

        /* Table */
        .table-container {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #0f172a;
            border-bottom: 1px solid #334155;
        }

        th {
            padding: 1rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #cbd5e1;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #334155;
            font-size: 0.9375rem;
        }

        tbody tr {
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: rgba(71, 85, 105, 0.2);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .company-cell {
            font-weight: 600;
            color: #e2e8f0;
        }

        .location-cell {
            color: #94a3b8;
        }

        .link-btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 0.375rem;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .link-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .link-btn:active {
            transform: translateY(0);
        }

        .empty-state {
            padding: 3rem;
            text-align: center;
            color: #94a3b8;
        }

        .loading {
            padding: 2rem;
            text-align: center;
            color: #94a3b8;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .content-grid {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: relative;
                top: 0;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }

            th, td {
                padding: 0.75rem;
                font-size: 0.875rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <h1>💼 Job Market Dashboard</h1>
            <p class="header-subtitle">Search across thousands of jobs from top companies</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Search -->
        <div class="search-section">
            <div class="search-wrapper">
                <input
                    type="text"
                    id="searchInput"
                    class="search-input"
                    placeholder="Search job titles or companies..."
                >
            </div>
        </div>

        <!-- Grid Layout -->
        <div class="content-grid">
            <!-- Sidebar Filters -->
            <div class="sidebar">
                <div class="filter-header">
                    <h2>🎯 Filters</h2>
                    <button class="clear-btn" onclick="clearFilters()">Clear</button>
                </div>

                <!-- Company Filter -->
                <div class="filter-group">
                    <h3>Company</h3>
                    <div class="filter-list" id="companyList"></div>
                </div>

                <!-- Location Filter -->
                <div class="filter-group">
                    <h3>Location</h3>
                    <div class="filter-list" id="locationList"></div>
                </div>

                <!-- Job Title Filter -->
                <div class="filter-group">
                    <h3>Job Title</h3>
                    <div class="filter-list" id="titleList"></div>
                </div>
            </div>

            <!-- Results Section -->
            <div class="results-section">
                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Results</div>
                        <div class="stat-value" id="resultCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Companies</div>
                        <div class="stat-value blue" id="companyCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Locations</div>
                        <div class="stat-value green" id="locationCount">0</div>
                    </div>
                </div>

                <!-- Table -->
                <div class="table-container">
                    <div id="loadingState" class="loading">Loading your jobs...</div>
                    <table id="jobsTable" style="display: none;">
                        <thead>
                            <tr>
                                <th>Company</th>
                                <th>Job Title</th>
                                <th>Location</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="jobsBody"></tbody>
                    </table>
                    <div id="emptyState" class="empty-state" style="display: none;">
                        No jobs match your filters
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allJobs = [];
        let filters = {
            companies: new Set(),
            locations: new Set(),
            titles: new Set()
        };

        // Load CSV file
        async function loadCSV() {
            try {
                const response = await fetch('all_jobs.csv');
                if (!response.ok) {
                    throw new Error('CSV file not found');
                }
                const csv = await response.text();
                
                Papa.parse(csv, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        allJobs = results.data.filter(job => job.company && job.company.trim());
                        if (allJobs.length === 0) {
                            document.getElementById('loadingState').innerHTML = 
                                '❌ No valid jobs found in CSV. Check the file format.';
                            return;
                        }
                        document.getElementById('loadingState').style.display = 'none';
                        initializeFilters();
                        renderJobs();
                    },
                    error: (error) => {
                        document.getElementById('loadingState').innerHTML = 
                            '❌ Error parsing CSV: ' + error.message;
                    }
                });
            } catch (error) {
                document.getElementById('loadingState').innerHTML = 
                    '❌ Could not load all_jobs.csv. Make sure the file is in the same folder as this HTML file.';
                console.error('Error:', error);
            }
        }

        // Initialize filter options
        function initializeFilters() {
            const companies = [...new Set(allJobs.map(j => j.company))].sort();
            const locations = [...new Set(allJobs.filter(j => j.location).map(j => j.location))].sort();
            const titles = [...new Set(allJobs.map(j => j.title))].sort();

            renderFilterList('companyList', companies, 'companies');
            renderFilterList('locationList', locations, 'locations');
            renderFilterList('titleList', titles.slice(0, 15), 'titles');
        }

        // Render filter checkboxes
        function renderFilterList(elementId, items, filterType) {
            const container = document.getElementById(elementId);
            container.innerHTML = items.map((item, idx) => `
                <div class="filter-item">
                    <input 
                        type="checkbox" 
                        id="${filterType}-${idx}"
                        onchange="toggleFilter('${filterType}', '${item.replace(/'/g, "\\'")}', this.checked)"
                    >
                    <label for="${filterType}-${idx}">${item}</label>
                </div>
            `).join('');
        }

        // Toggle filter
        function toggleFilter(type, value, checked) {
            if (checked) {
                filters[type].add(value);
            } else {
                filters[type].delete(value);
            }
            renderJobs();
        }

        // Clear all filters
        function clearFilters() {
            filters = { companies: new Set(), locations: new Set(), titles: new Set() };
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.getElementById('searchInput').value = '';
            renderJobs();
        }

        // Filter and render jobs
        function renderJobs() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = allJobs.filter(job => {
                const matchCompany = filters.companies.size === 0 || filters.companies.has(job.company);
                const matchLocation = filters.locations.size === 0 || filters.locations.has(job.location);
                const matchTitle = filters.titles.size === 0 || filters.titles.has(job.title);
                const matchSearch = !searchTerm || 
                    job.title.toLowerCase().includes(searchTerm) ||
                    job.company.toLowerCase().includes(searchTerm);
                
                return matchCompany && matchLocation && matchTitle && matchSearch;
            });

            // Update stats
            document.getElementById('resultCount').textContent = filtered.length.toLocaleString();
            document.getElementById('companyCount').textContent = new Set(filtered.map(j => j.company)).size;
            document.getElementById('locationCount').textContent = new Set(filtered.filter(j => j.location).map(j => j.location)).size;

            // Render table
            const jobsBody = document.getElementById('jobsBody');
            const jobsTable = document.getElementById('jobsTable');
            const emptyState = document.getElementById('emptyState');

            if (filtered.length === 0) {
                jobsTable.style.display = 'none';
                emptyState.style.display = 'block';
            } else {
                jobsBody.innerHTML = filtered.map(job => `
                    <tr>
                        <td class="company-cell">${job.company}</td>
                        <td>${job.title}</td>
                        <td class="location-cell">${job.location || '—'}</td>
                        <td class="link-cell"><button class="link-btn" onclick="window.open('${job.url}', '_blank')">Apply Now</button></td>
                    </tr>
                `).join('');
                jobsTable.style.display = 'table';
                emptyState.style.display = 'none';
            }
        }

        // Search input listener
        document.getElementById('searchInput').addEventListener('input', renderJobs);

        // Load on page load
        loadCSV();
    </script>
</body>
</html>
