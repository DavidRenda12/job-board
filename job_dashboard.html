<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Market Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        .header {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
            padding: 2rem;
        }

        .header-content {
            max-width: 90rem;
            margin: 0 auto;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header-subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .container {
            max-width: 90rem;
            margin: 0 auto;
            padding: 2rem;
        }

        .search-section {
            margin-bottom: 2rem;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-wrapper::before {
            content: '🔍';
            position: absolute;
            left: 1rem;
            font-size: 1.2rem;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            color: #e2e8f0;
            font-size: 1rem;
        }

        .search-input::placeholder {
            color: #64748b;
        }

        .search-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .content-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
        }

        .sidebar {
            position: sticky;
            top: 2rem;
            height: fit-content;
        }

        .filter-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .filter-header h2 {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .clear-btn {
            padding: 0.25rem 0.5rem;
            background: #475569;
            color: #cbd5e1;
            border: none;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .clear-btn:hover {
            background: #64748b;
        }

        .filter-group {
            margin-bottom: 2rem;
        }

        .filter-group h3 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }

        .filter-search-input {
            width: 100%;
            padding: 0.5rem;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 0.375rem;
            color: #e2e8f0;
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
        }

        .filter-search-input::placeholder {
            color: #64748b;
        }

        .filter-search-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .filter-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .filter-list::-webkit-scrollbar {
            width: 6px;
        }

        .filter-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .filter-list::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }

        .filter-list::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
        }

        .filter-item input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
            accent-color: #3b82f6;
        }

        .filter-item label {
            font-size: 0.875rem;
            color: #94a3b8;
            cursor: pointer;
            flex: 1;
            transition: color 0.2s;
        }

        .filter-item:hover label {
            color: #cbd5e1;
        }

        .results-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-weight: 500;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }

        .stat-value.blue {
            color: #60a5fa;
        }

        .stat-value.green {
            color: #4ade80;
        }

        .table-container {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #0f172a;
            border-bottom: 1px solid #334155;
        }

        th {
            padding: 1rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #cbd5e1;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #334155;
            font-size: 0.9375rem;
        }

        tbody tr {
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: rgba(71, 85, 105, 0.2);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .company-cell {
            font-weight: 600;
            color: #e2e8f0;
        }

        .location-cell {
            color: #94a3b8;
        }

        .link-btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 0.375rem;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .link-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .empty-state {
            padding: 3rem;
            text-align: center;
            color: #94a3b8;
        }

        .loading {
            padding: 2rem;
            text-align: center;
            color: #94a3b8;
        }

        @media (max-width: 1024px) {
            .content-grid {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: relative;
                top: 0;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>💼 Job Market Dashboard</h1>
            <p class="header-subtitle">Access jobs directly from company ATS sites</p>
        </div>
    </div>

    <div class="container">
        <div class="search-section">
            <div class="search-wrapper">
                <input
                    type="text"
                    id="mainSearch"
                    class="search-input"
                    placeholder="Search job titles or companies..."
                >
            </div>
        </div>

        <div class="content-grid">
            <div class="sidebar">
                <div class="filter-header">
                    <h2>🎯 Filters</h2>
                    <button class="clear-btn" onclick="clearAllFilters()">Clear</button>
                </div>

                <div class="filter-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <h3 style="margin: 0;">Company</h3>
                        <button class="clear-btn" onclick="selectAllCompanies()" style="font-size: 0.7rem; padding: 0.2rem 0.4rem;">All</button>
                    </div>
                    <input 
                        type="text" 
                        class="filter-search-input" 
                        id="companySearch"
                        placeholder="Search companies..."
                        onkeyup="filterCompanies()"
                    >
                    <div class="filter-list" id="companyList"></div>
                </div>

                <div class="filter-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <h3 style="margin: 0;">Location</h3>
                        <button class="clear-btn" onclick="selectAllLocations()" style="font-size: 0.7rem; padding: 0.2rem 0.4rem;">All</button>
                    </div>
                    <input 
                        type="text" 
                        class="filter-search-input" 
                        id="locationSearch"
                        placeholder="Search locations..."
                        onkeyup="filterLocations()"
                    >
                    <div class="filter-list" id="locationList"></div>
                </div>

                <div class="filter-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <h3 style="margin: 0;">Job Title</h3>
                        <button class="clear-btn" onclick="selectAllTitles()" style="font-size: 0.7rem; padding: 0.2rem 0.4rem;">All</button>
                    </div>
                    <input 
                        type="text" 
                        class="filter-search-input" 
                        id="titleSearch"
                        placeholder="Search titles..."
                        onkeyup="filterTitles()"
                    >
                    <div class="filter-list" id="titleList"></div>
                </div>
            </div>

            <div class="results-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Results</div>
                        <div class="stat-value" id="resultCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Companies</div>
                        <div class="stat-value blue" id="companyCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Locations</div>
                        <div class="stat-value green" id="locationCount">0</div>
                    </div>
                </div>

                <div class="table-container">
                    <div id="loadingState" class="loading">Loading your jobs...</div>
                    <table id="jobsTable" style="display: none;">
                        <thead>
                            <tr>
                                <th>Company</th>
                                <th>Job Title</th>
                                <th>Location</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="jobsBody"></tbody>
                    </table>
                    <div id="emptyState" class="empty-state" style="display: none;">
                        No jobs match your filters
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allJobs = [];
        let allCompanies = [];
        let allLocations = [];
        let allTitles = [];
        
        let selectedCompanies = new Set();
        let selectedLocations = new Set();
        let selectedTitles = new Set();

        async function loadCSV() {
            try {
                const response = await fetch('all_jobs.csv');
                if (!response.ok) throw new Error('CSV not found');
                
                const csv = await response.text();
                Papa.parse(csv, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        allJobs = results.data.filter(job => job.company && job.title);
                        
                        if (allJobs.length === 0) {
                            document.getElementById('loadingState').innerHTML = 
                                '❌ No jobs found in CSV.';
                            return;
                        }
                        
                        allCompanies = [...new Set(allJobs.map(j => j.company))].sort();
                        allLocations = [...new Set(allJobs.filter(j => j.location).map(j => j.location))].sort();
                        allTitles = [...new Set(allJobs.map(j => j.title))].sort();
                        
                        document.getElementById('loadingState').style.display = 'none';
                        
                        renderCompanyList();
                        renderLocationList();
                        renderTitleList();
                        renderJobs();
                    }
                });
            } catch (error) {
                document.getElementById('loadingState').innerHTML = 
                    '❌ Could not load all_jobs.csv. Make sure it\'s in the same folder.';
            }
        }

        function renderCompanyList() {
            const container = document.getElementById('companyList');
            container.innerHTML = allCompanies.map((company, idx) => `
                <div class="filter-item">
                    <input 
                        type="checkbox" 
                        id="company-${idx}"
                        onchange="toggleCompany('${company.replace(/'/g, "\\'")}')"
                    >
                    <label for="company-${idx}">${company}</label>
                </div>
            `).join('');
        }

        function renderLocationList() {
            const container = document.getElementById('locationList');
            container.innerHTML = allLocations.map((location, idx) => `
                <div class="filter-item">
                    <input 
                        type="checkbox" 
                        id="location-${idx}"
                        onchange="toggleLocation('${location.replace(/'/g, "\\'")}')"
                    >
                    <label for="location-${idx}">${location}</label>
                </div>
            `).join('');
        }

        function renderTitleList() {
            const container = document.getElementById('titleList');
            const limitedTitles = allTitles.slice(0, 50);
            container.innerHTML = limitedTitles.map((title, idx) => `
                <div class="filter-item">
                    <input 
                        type="checkbox" 
                        id="title-${idx}"
                        onchange="toggleTitle('${title.replace(/'/g, "\\'")}')"
                    >
                    <label for="title-${idx}">${title}</label>
                </div>
            `).join('');
            
            if (allTitles.length > 50) {
                const container = document.getElementById('titleList');
                container.innerHTML += `<p style="color: #64748b; font-size: 0.75rem; margin-top: 0.5rem;">+ ${allTitles.length - 50} more titles</p>`;
            }
        }

        function filterCompanies() {
            const search = document.getElementById('companySearch').value.toLowerCase();
            const items = document.querySelectorAll('#companyList .filter-item');
            items.forEach(item => {
                const label = item.querySelector('label').textContent.toLowerCase();
                item.style.display = label.includes(search) ? 'flex' : 'none';
            });
        }

        function filterLocations() {
            const search = document.getElementById('locationSearch').value.toLowerCase();
            const items = document.querySelectorAll('#locationList .filter-item');
            items.forEach(item => {
                const label = item.querySelector('label').textContent.toLowerCase();
                item.style.display = label.includes(search) ? 'flex' : 'none';
            });
        }

        function filterTitles() {
            const search = document.getElementById('titleSearch').value.toLowerCase();
            const items = document.querySelectorAll('#titleList .filter-item');
            items.forEach(item => {
                const label = item.querySelector('label').textContent.toLowerCase();
                item.style.display = label.includes(search) ? 'flex' : 'none';
            });
        }

        function selectAllCompanies() {
            const search = document.getElementById('companySearch').value.toLowerCase();
            allCompanies.forEach(company => {
                if (company.toLowerCase().includes(search)) {
                    selectedCompanies.add(company);
                }
            });
            document.querySelectorAll('#companyList .filter-item').forEach(item => {
                if (item.style.display !== 'none') {
                    item.querySelector('input[type="checkbox"]').checked = true;
                }
            });
            renderJobs();
        }

        function selectAllLocations() {
            const search = document.getElementById('locationSearch').value.toLowerCase();
            allLocations.forEach(location => {
                if (location.toLowerCase().includes(search)) {
                    selectedLocations.add(location);
                }
            });
            document.querySelectorAll('#locationList .filter-item').forEach(item => {
                if (item.style.display !== 'none') {
                    item.querySelector('input[type="checkbox"]').checked = true;
                }
            });
            renderJobs();
        }

        function selectAllTitles() {
            const search = document.getElementById('titleSearch').value.toLowerCase();
            allTitles.forEach(title => {
                if (title.toLowerCase().includes(search)) {
                    selectedTitles.add(title);
                }
            });
            document.querySelectorAll('#titleList .filter-item').forEach(item => {
                if (item.style.display !== 'none') {
                    item.querySelector('input[type="checkbox"]').checked = true;
                }
            });
            renderJobs();
        }

        function toggleCompany(company) {
            if (selectedCompanies.has(company)) {
                selectedCompanies.delete(company);
            } else {
                selectedCompanies.add(company);
            }
            renderJobs();
        }

        function toggleLocation(location) {
            if (selectedLocations.has(location)) {
                selectedLocations.delete(location);
            } else {
                selectedLocations.add(location);
            }
            renderJobs();
        }

        function toggleTitle(title) {
            if (selectedTitles.has(title)) {
                selectedTitles.delete(title);
            } else {
                selectedTitles.add(title);
            }
            renderJobs();
        }

        function clearAllFilters() {
            selectedCompanies.clear();
            selectedLocations.clear();
            selectedTitles.clear();
            document.getElementById('mainSearch').value = '';
            document.getElementById('companySearch').value = '';
            document.getElementById('locationSearch').value = '';
            document.getElementById('titleSearch').value = '';
            
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            
            renderCompanyList();
            renderLocationList();
            renderTitleList();
            renderJobs();
        }

        function renderJobs() {
            const mainSearch = document.getElementById('mainSearch').value.toLowerCase();
            
            const filtered = allJobs.filter(job => {
                const matchCompany = selectedCompanies.size === 0 || selectedCompanies.has(job.company);
                const matchLocation = selectedLocations.size === 0 || selectedLocations.has(job.location);
                const matchTitle = selectedTitles.size === 0 || selectedTitles.has(job.title);
                const matchSearch = !mainSearch || 
                    job.title.toLowerCase().includes(mainSearch) ||
                    job.company.toLowerCase().includes(mainSearch);
                
                return matchCompany && matchLocation && matchTitle && matchSearch;
            });

            document.getElementById('resultCount').textContent = filtered.length.toLocaleString();
            document.getElementById('companyCount').textContent = new Set(filtered.map(j => j.company)).size;
            document.getElementById('locationCount').textContent = new Set(filtered.filter(j => j.location).map(j => j.location)).size;

            const jobsBody = document.getElementById('jobsBody');
            const jobsTable = document.getElementById('jobsTable');
            const emptyState = document.getElementById('emptyState');

            if (filtered.length === 0) {
                jobsTable.style.display = 'none';
                emptyState.style.display = 'block';
            } else {
                jobsBody.innerHTML = filtered.map(job => `
                    <tr>
                        <td class="company-cell">${job.company}</td>
                        <td>${job.title}</td>
                        <td class="location-cell">${job.location || '—'}</td>
                        <td><button class="link-btn" onclick="window.open('${job.url}', '_blank')">Apply</button></td>
                    </tr>
                `).join('');
                jobsTable.style.display = 'table';
                emptyState.style.display = 'none';
            }
        }

        document.getElementById('mainSearch').addEventListener('input', renderJobs);

        loadCSV();
    </script>
</body>
</html>
