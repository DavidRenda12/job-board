<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Market Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .header {
            background: rgba(15, 23, 42, 0.5);
            border-bottom: 1px solid #334155;
            padding: 2rem;
        }
        .container {
            max-width: 90rem;
            margin: 0 auto;
            padding: 2rem;
        }
        .debug {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 0.5rem;
            color: #4ade80;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💼 Job Dashboard - DEBUG MODE</h1>
    </div>
    <div class="container">
        <div class="debug" id="debug"></div>
    </div>

    <script>
        async function test() {
            const debug = document.getElementById('debug');
            
            try {
                debug.innerHTML += '<p>Trying to load all_jobs_combined.csv...</p>';
                
                const response = await fetch('all_jobs_combined.csv');
                debug.innerHTML += '<p>Response status: ' + response.status + '</p>';
                
                if (!response.ok) {
                    debug.innerHTML += '<p style="color: red;">ERROR: File not found (404)</p>';
                    return;
                }
                
                const csv = await response.text();
                debug.innerHTML += '<p>File size: ' + csv.length + ' bytes</p>';
                
                Papa.parse(csv, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        const jobs = results.data.filter(job => job.company && job.title);
                        debug.innerHTML += '<p style="color: #4ade80;"><strong>SUCCESS! Loaded ' + jobs.length + ' jobs</strong></p>';
                        debug.innerHTML += '<p>Sample: ' + jobs[0].company + ' - ' + jobs[0].title + '</p>';
                    }
                });
            } catch (error) {
                debug.innerHTML += '<p style="color: red;">ERROR: ' + error.message + '</p>';
            }
        }
        
        test();
    </script>
</body>
</html>
